version: '3.8'

services:
  webapp-dev:
    build:
      context: ./webapp
      dockerfile: Dockerfile.dev
    container_name: citizenship-test-webapp-dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reload
      - ./webapp:/app
      - /app/node_modules
      - /app/.next
      # Mount database directory
      - ./data:/app/data:ro
    environment:
      - NODE_ENV=development
    command: npm run dev
    restart: unless-stopped
